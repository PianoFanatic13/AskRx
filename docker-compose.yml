services:
  db:
    image: pgvector/pgvector:pg16
    container_name: asrx_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: asrx
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d asrx"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
